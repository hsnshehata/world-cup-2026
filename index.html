    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { margin: 0; overflow-x: hidden; background: #0a0a1a; }
        
        /* Globe Container */
        #globe-container { width: 100%; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }
        
        /* Overlay UI */
        .overlay { position: relative; z-index: 10; pointer-events: none; }
        .overlay > * { pointer-events: auto; }
        
        /* Glowing point animation */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px 2px rgba(212, 175, 55, 0.6); }
            50% { box-shadow: 0 0 20px 6px rgba(212, 175, 55, 0.9); }
        }
        .stadium-pulse { animation: pulse-glow 2s ease-in-out infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
        
        /* Glass morphism */
        .glass {
            background: rgba(10, 10, 26, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 3px; }
        
        /* Match card hover */
        .match-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .match-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.15);
        }
        
        /* Countdown */
        .countdown-digit {
            background: linear-gradient(135deg, #D4AF37, #F4D03F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        
        /* Egyptian flag colors accent */
        .egypt-accent {
            background: linear-gradient(90deg, #ce1126 0%, #ce1126 33%, #ffffff 33%, #ffffff 66%, #000000 66%, #000000 100%);
            height: 3px;
        }
        
        /* Arab badge */
        .arab-badge {
            background: linear-gradient(135deg, #006233, #007a3d);
        }
        
        /* Egypt badge */
        .egypt-badge {
            background: linear-gradient(135deg, #ce1126, #a00e1f);
        }
        
        /* Stadium marker */
        .stadium-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #D4AF37;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        /* Prediction bar */
        .prediction-bar {
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }
        .prediction-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        /* Tab active */
        .tab-active {
            background: linear-gradient(135deg, #D4AF37, #F4D03F);
            color: #0a0a1a;
            font-weight: 700;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .globe-full { height: 50vh; }
        }
    </style>

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        return `${days[d.getDay()]}، ${d.getDate()} ${months[d.getMonth()]}`;
    }
    
    function getTimeUntil(dateStr, timeStr) {
        const matchDate = new Date(`${dateStr}T${timeStr}:00-04:00`);
        const now = new Date();
        const diff = matchDate - now;
        
        if (diff <= 0) return { text: 'انتهى الماتش', isLive: true, isPast: true };
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        
        if (days > 0) return { text: `${days} يوم و ${hours} ساعة`, isLive: false, isPast: false };
        if (hours > 0) return { text: `${hours} ساعة و ${mins} دقيقة`, isLive: false, isPast: false };
        return { text: `${mins} دقيقة`, isLive: false, isPast: false };
    }
    
    function getPrediction(team1, team2) {
        // Simple prediction based on "strength"
        const strength = {
            'BRA': 95, 'ARG': 93, 'FRA': 92, 'ENG': 90, 'ESP': 89, 'GER': 88,
            'POR': 87, 'ITA': 86, 'NED': 85, 'BEL': 84, 'CRO': 83,
            'MAR': 82, 'EGY': 78, 'KSA': 72, 'QAT': 70, 'TUN': 75,
            'JPN': 79, 'KOR': 77, 'USA': 76, 'MEX': 80, 'CAN': 73,
            'URU': 81, 'COL': 80, 'SEN': 79, 'NGA': 76, 'CMR': 74,
            'AUS': 73, 'IRN': 72, 'ECU': 71, 'WAL': 74, 'POL': 75,
            'GHA': 70, 'TBD': 50,
        };
        
        const s1 = strength[team1] || 50;
        const s2 = strength[team2] || 50;
        const total = s1 + s2;
        const p1 = Math.round((s1 / total) * 100);
        const p2 = 100 - p1;
        const drawProb = Math.max(15, 30 - Math.abs(s1 - s2));
        const adjP1 = Math.round((100 - drawProb) * p1 / 100);
        const adjP2 = 100 - drawProb - adjP1;
        
        return { team1: adjP1, team2: adjP2, draw: drawProb };
    }

    // THREE.JS GLOBE
    // ============================================
    
    let scene, camera, renderer, globe, markers = [];
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0, targetRotationY = 0;
    let isDragging = false;
    let previousMouseX = 0, previousMouseY = 0;
    
    function initGlobe() {
        const container = document.getElementById('globe-container');
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.z = 3.5;
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Globe
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        
        // Create gradient texture for globe
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Dark ocean background
        const gradient = ctx.createLinearGradient(0, 0, 0, 512);
        gradient.addColorStop(0, '#0a1628');
        gradient.addColorStop(0.5, '#0d1f3c');
        gradient.addColorStop(1, '#0a1628');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1024, 512);
        
        // Draw simplified continents
        ctx.fillStyle = '#1a3a2a';
        ctx.strokeStyle = '#2a5a3a';
        ctx.lineWidth = 1;
        
        // North America
        drawContinent(ctx, [
            [120, 80], [200, 60], [280, 80], [320, 120], [300, 180],
            [260, 220], [220, 240], [180, 220], [140, 180], [100, 140], [120, 80]
        ]);
        
        // South America
        drawContinent(ctx, [
            [240, 260], [280, 250], [300, 280], [310, 330], [290, 380],
            [260, 420], [230, 400], [220, 350], [220, 300], [240, 260]
        ]);
        
        // Europe
        drawContinent(ctx, [
            [480, 80], [540, 70], [580, 90], [570, 130], [540, 150],
            [500, 160], [470, 140], [460, 110], [480, 80]
        ]);
        
        // Africa
        drawContinent(ctx, [
            [480, 180], [540, 170], [580, 200], [590, 260], [570, 320],
            [530, 360], [490, 350], [460, 310], [450, 250], [460, 200], [480, 180]
        ]);
        
        // Asia
        drawContinent(ctx, [
            [580, 60], [700, 50], [800, 70], [850, 120], [840, 180],
            [780, 220], [720, 240], [660, 220], [620, 180], [580, 140], [580, 60]
        ]);
        
        // Australia
        drawContinent(ctx, [
            [780, 320], [840, 310], [870, 340], [860, 380], [820, 390],
            [780, 370], [770, 340], [780, 320]
        ]);
        
        // Add grid lines
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.08)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 12; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 1024 / 12, 0);
            ctx.lineTo(i * 1024 / 12, 512);
            ctx.stroke();
        }
        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 512 / 6);
            ctx.lineTo(1024, i * 512 / 6);
            ctx.stroke();
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.MeshPhongMaterial({
            map: texture,
            transparent: true,
            opacity: 0.95,
            shininess: 25,
        });
        
        globe = new THREE.Mesh(geometry, material);
        scene.add(globe);
        
        // Atmosphere glow
        const atmosphereGeometry = new THREE.SphereGeometry(1.05, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x1a5f2a,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide,
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // Stadium markers
        stadiums.forEach(stadium => {
            const marker = createMarker(stadium);
            markers.push(marker);
            globe.add(marker);
        });
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xD4AF37, 0.3, 10);
        pointLight.position.set(-3, 2, 3);
        scene.add(pointLight);
        
        // Mouse interaction
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', onMouseUp);
        renderer.domElement.addEventListener('mouseleave', onMouseUp);
        renderer.domElement.addEventListener('click', onGlobeClick);
        renderer.domElement.addEventListener('wheel', onWheel);
        
        // Touch
        renderer.domElement.addEventListener('touchstart', onTouchStart, {passive: false});
        renderer.domElement.addEventListener('touchmove', onTouchMove, {passive: false});
        renderer.domElement.addEventListener('touchend', onTouchEnd);
        
        window.addEventListener('resize', onWindowResize);
        
        animate();
    }
    
    function drawContinent(ctx, points) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }
    
    function createMarker(stadium) {
        const phi = (90 - stadium.lat) * (Math.PI / 180);
        const theta = (stadium.lng + 180) * (Math.PI / 180);
        
        const x = -1.02 * Math.sin(phi) * Math.cos(theta);
        const y = 1.02 * Math.cos(phi);
        const z = 1.02 * Math.sin(phi) * Math.sin(theta);
        
        // Glowing sphere
        const geometry = new THREE.SphereGeometry(0.025, 16, 16);
        const material = new THREE.MeshBasicMaterial({ color: 0xD4AF37 });
        const marker = new THREE.Mesh(geometry, material);
        marker.position.set(x, y, z);
        marker.userData = { stadiumId: stadium.id };
        
        // Outer glow
        const glowGeometry = new THREE.SphereGeometry(0.04, 16, 16);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xD4AF37,
            transparent: true,
            opacity: 0.3,
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        marker.add(glow);
        
        return marker;
    }
    
    function onMouseDown(e) {
        isDragging = true;
        previousMouseX = e.clientX;
        previousMouseY = e.clientY;
    }
    
    function onMouseMove(e) {
        if (isDragging) {
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;
            globe.rotation.y += deltaX * 0.005;
            globe.rotation.x += deltaY * 0.005;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        }
    }
    
    function onMouseUp() {
        isDragging = false;
    }
    
    function onWheel(e) {
        e.preventDefault();
        camera.position.z += e.deltaY * 0.002;
        camera.position.z = Math.max(2, Math.min(6, camera.position.z));
    }
    
    let touchStartX, touchStartY;
    function onTouchStart(e) {
        if (e.touches.length === 1) {
            isDragging = true;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            previousMouseX = touchStartX;
            previousMouseY = touchStartY;
        }
    }
    function onTouchMove(e) {
        e.preventDefault();
        if (isDragging && e.touches.length === 1) {
            const deltaX = e.touches[0].clientX - previousMouseX;
            const deltaY = e.touches[0].clientY - previousMouseY;
            globe.rotation.y += deltaX * 0.005;
            globe.rotation.x += deltaY * 0.005;
            previousMouseX = e.touches[0].clientX;
            previousMouseY = e.touches[0].clientY;
        }
    }
    function onTouchEnd() {
        isDragging = false;
    }
    
    function onGlobeClick(e) {
        if (isDragging) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((e.clientX - rect.left) / rect.width) * 2 - 1,
            -((e.clientY - rect.top) / rect.height) * 2 + 1
        );
        
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObjects(markers);
        if (intersects.length > 0) {
            const stadiumId = intersects[0].object.userData.stadiumId;
            if (stadiumId) showStadiumModal(stadiumId);
        }
    }
    
    function onWindowResize() {
        const container = document.getElementById('globe-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }
    
    function animate() {
        requestAnimationFrame(animate);
        
        if (!isDragging) {
            globe.rotation.y += 0.001;
        }
        
        // Pulse markers
        const time = Date.now() * 0.002;
        markers.forEach((marker, i) => {
            const scale = 1 + Math.sin(time + i * 0.5) * 0.3;
            if (marker.children[0]) {
                marker.children[0].scale.set(scale, scale, scale);
            }
        });
        
        renderer.render(scene, camera);
    }

        const isEgyptMatch = match.team1 === 'EGY' || match.team2 === 'EGY';
        const isArabMatch = arabTeams.some(a => a.code === match.team1 || a.code === match.team2);
        
        const cardClass = isEgyptMatch ? 'border-gold/40 bg-gold/5' : (isArabMatch ? 'border-green-500/30 bg-green-500/5' : '');
        
        return `
            <div class="match-card glass rounded-2xl p-4 ${cardClass}">
                <div class="flex items-center justify-between mb-3">
                    <span class="px-2 py-0.5 rounded text-xs ${getStageBadge(match.stage)}">${getStageName(match.stage)}</span>
                    <span class="text-xs text-gray-400">${formatDate(match.date)}</span>
                </div>
                
                <div class="flex items-center justify-between mb-3">
                    <div class="flex-1 text-center">
                        <div class="text-3xl mb-1">${team1.flag}</div>
                        <div class="font-bold text-sm ${match.team1 === 'EGY' ? 'text-gold' : ''}">${team1.name}</div>
                    </div>
                    <div class="px-4 text-center">
                        <div class="text-2xl font-bold text-gold">VS</div>
                        <div class="text-xs text-gray-400">${match.time}</div>
                    </div>
                    <div class="flex-1 text-center">
                        <div class="text-3xl mb-1">${team2.flag}</div>
                        <div class="font-bold text-sm ${match.team2 === 'EGY' ? 'text-gold' : ''}">${team2.name}</div>
                    </div>
                </div>
                
                <!-- Prediction Bar -->
                <div class="mb-3">
                    <div class="flex justify-between text-xs text-gray-400 mb-1">
                        <span>${prediction.team1}%</span>
                        <span>تعادل ${prediction.draw}%</span>
                        <span>${prediction.team2}%</span>
                    </div>
                    <div class="prediction-bar flex">
                        <div class="prediction-fill bg-blue-500" style="width: ${prediction.team1}%"></div>
                        <div class="prediction-fill bg-gray-500" style="width: ${prediction.draw}%"></div>
                        <div class="prediction-fill bg-red-500" style="width: ${prediction.team2}%"></div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between text-xs">
                    <div class="flex items-center gap-1 text-gray-400">
                        <span>🏟️</span>
                        <span>${stadium.name}، ${stadium.city}</span>
                    </div>
                    <div class="${timeUntil.isLive ? 'text-red-400 font-bold' : 'text-gray-400'}">
                        ${timeUntil.isPast ? '⏰ انتهى' : (timeUntil.isLive ? '🔴 مباشر!' : `⏱️ ${timeUntil.text}`)}
                    </div>
                </div>
                
                ${isEgyptMatch ? '<div class="mt-2 text-center"><span class="egypt-badge text-xs px-3 py-1 rounded-full">🇪🇬 ماتش منتخب مصر</span></div>' : ''}
                ${isArabMatch && !isEgyptMatch ? '<div class="mt-2 text-center"><span class="arab-badge text-xs px-3 py-1 rounded-full">🌙 ماتش عربي</span></div>' : ''}
            </div>
        `;
    }
    
    function renderQuickStats() {
        const egyptMatches = matches.filter(m => m.team1 === 'EGY' || m.team2 === 'EGY');
        const arabMatches = matches.filter(m => arabTeams.some(a => a.code === m.team1 || a.code === m.team2));
        const totalMatches = matches.length;
        const totalStadiums = stadiums.length;
        
        return `
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">${totalMatches}</div>
                <div class="text-xs text-gray-400">إجمالي الماتشات</div>
            </div>
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">${totalStadiums}</div>
                <div class="text-xs text-gray-400">ملعب مستضيف</div>
            </div>
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">48</div>
                <div class="text-xs text-gray-400">منتخب مشارك</div>
            </div>
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">${egyptMatches.length}</div>
                <div class="text-xs text-gray-400">ماتشات مصر 🇪🇬</div>
            </div>
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">${arabMatches.length}</div>
                <div class="text-xs text-gray-400">ماتشات عربية 🌙</div>
            </div>
            <div class="glass rounded-xl p-3 text-center">
                <div class="text-3xl font-bold text-gold">3</div>
                <div class="text-xs text-gray-400">دول مستضيفة</div>
            </div>
        `;
    }
    
    function renderArabTeams() {
        const qualified = arabTeams.filter(a => a.qualified);
        
        return qualified.map(t => {
            const teamMatches = matches.filter(m => m.team1 === t.code || m.team2 === t.code);
            return `
                <div class="glass rounded-xl p-3 flex items-center gap-3">
                    <span class="text-2xl">${t.flag}</span>
                    <div class="flex-1">
                        <div class="font-bold text-sm">${t.name}</div>
                        <div class="text-xs text-gray-400">المجموعة ${t.group} • ${teamMatches.length} ماتشات</div>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-green-400"></div>
                </div>
            `;
        }).join('');
    }
    
    // ============================================
    // INTERACTION
    // ============================================
    
    let currentTab = 'egypt';
    
    function switchTab(tab) {
        currentTab = tab;
        
        // Update tab styles
        ['egypt', 'arab', 'all', 'groups'].forEach(t => {
            const el = document.getElementById(`tab-${t}`);
            if (t === tab) {
                el.className = 'tab-active px-4 py-2 rounded-xl text-sm transition-all flex items-center gap-2';
            } else {
                el.className = 'glass px-4 py-2 rounded-xl text-sm transition-all flex items-center gap-2 hover:border-gold/50';
            }
        });
        
        // Render content
        const content = document.getElementById('content-area');
        switch(tab) {
            case 'egypt': content.innerHTML = renderEgyptTab(); break;
            case 'arab': content.innerHTML = renderArabTab(); break;
            case 'all': content.innerHTML = renderAllMatchesTab(); break;
            case 'groups': content.innerHTML = renderGroupsTab(); break;
        }
    }
    
    function showStadiumModal(stadiumId) {
        const stadium = getStadium(stadiumId);
        const stadiumMatches = matches.filter(m => m.stadium === stadiumId);
        
        document.getElementById('modal-stadium-name').textContent = stadium.name;
        document.getElementById('modal-stadium-city').textContent = `${stadium.city}، ${stadium.country}`;
        document.getElementById('modal-stadium-info').innerHTML = `
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="glass rounded-xl p-3">
                    <div class="text-xl font-bold text-gold">${stadium.capacity}</div>
                    <div class="text-xs text-gray-400">السعة</div>
                </div>
                <div class="glass rounded-xl p-3">
                    <div class="text-xl font-bold text-gold">${stadiumMatches.length}</div>
                    <div class="text-xs text-gray-400">ماتشات</div>
                </div>
                <div class="glass rounded-xl p-3">
                    <div class="text-xl font-bold text-gold">${stadium.country}</div>
                    <div class="text-xs text-gray-400">الدولة</div>
                </div>
            </div>
        `;
        
        document.getElementById('modal-matches').innerHTML = stadiumMatches.length > 0 
            ? stadiumMatches.map(m => renderMatchCard(m)).join('')
            : '<p class="text-gray-400 text-center py-4">لا توجد ماتشات محددة حالياً في هذا الملعب</p>';
        
        document.getElementById('stadium-modal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('stadium-modal').classList.remove('active');
    }
    
    // Countdown timer
    function updateCountdown() {
        const now = new Date();
        const diff = WORLD_CUP_START - now;
        
        if (diff <= 0) {
            // World Cup started
            const finalDiff = WORLD_CUP_FINAL - now;
            if (finalDiff <= 0) {
                document.getElementById('cd-days').textContent = '00';
                document.getElementById('cd-hours').textContent = '00';
                document.getElementById('cd-mins').textContent = '00';
                return;
            }
            const days = Math.floor(finalDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((finalDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((finalDiff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
            document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
            return;
        }
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        
        document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
        document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
    }
    
    // ============================================
    // INITIALIZATION
    // ============================================
    
    document.addEventListener('DOMContentLoaded', () => {
        initGlobe();
        renderStadiumsList();
        renderQuickStats();
        renderArabTeams();
        switchTab('egypt');
        updateCountdown();
        setInterval(updateCountdown, 60000);
    });
    </script>
</body>
</html>
