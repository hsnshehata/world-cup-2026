        #globe-wrap { position: relative; width: 100%; height: 420px; }
        #globe-container { width: 100%; height: 100%; }
        
        /* Stadium markers on globe */
        .globe-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
        }
        .globe-marker .dot {
            width: 14px; height: 14px;
            background: #D4AF37;
            border-radius: 50%;
            box-shadow: 0 0 12px 4px rgba(212,175,55,0.5);
            transition: all 0.3s;
        }
        .globe-marker:hover .dot {
            transform: scale(1.5);
            box-shadow: 0 0 20px 8px rgba(212,175,55,0.8);
        }
        .globe-marker .label {
            position: absolute;
            top: -28px; right: 50%;
            transform: translateX(50%);
            white-space: nowrap;
            font-size: 10px;
            background: rgba(0,0,0,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(212,175,55,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .globe-marker:hover .label { opacity: 1; }
        .globe-marker.egypt .dot { background: #ce1126; box-shadow: 0 0 12px 4px rgba(206,17,38,0.5); }
        .globe-marker.arab .dot { background: #006233; box-shadow: 0 0 12px 4px rgba(0,98,51,0.5); }
        
        /* Glass */
        .glass {
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        
        /* Match card */
        .match-card {
            transition: all 0.3s;

        }
        .match-card:hover {

        /* Countdown */
        .countdown-digit {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;

        /* Tabs */

            background: linear-gradient(135deg, #D4AF37, #F4D03F);
            color: #0a0a1a;

        }

        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 3px; }
        
        /* Prediction bar */
        .pred-bar { height: 6px; border-radius: 3px; overflow: hidden; background: rgba(255,255,255,0.1); }
        .pred-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        return { group: "bg-blue-500/20 text-blue-300", R32: "bg-green-500/20 text-green-300", QF: "bg-yellow-500/20 text-yellow-300", SF: "bg-orange-500/20 text-orange-300", "3rd": "bg-purple-500/20 text-purple-300", Final: "bg-gold/20 text-gold" }[s] || "bg-gray-500/20 text-gray-300";
    }
    
    function fmtDate(d) {
        const dt = new Date(d);
        const days = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const months = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
        return days[dt.getDay()] + "، " + dt.getDate() + " " + months[dt.getMonth()];
    }
    
    function timeUntil(date, time) {
        const m = new Date(date + "T" + time + ":00Z");
        const now = new Date();
        const diff = m - now;
        if (diff <= 0) return { text: "انتهى", past: true };
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const mn = Math.floor((diff % 3600000) / 60000);
        if (d > 0) return { text: d + " يوم و " + h + " ساعة", past: false };
        if (h > 0) return { text: h + " ساعة و " + mn + " دقيقة", past: false };
        return { text: mn + " دقيقة", past: false };
    }
    
    function prediction(t1, t2) {
        const str = { BRA:95, ARG:93, FRA:92, ENG:90, ESP:89, GER:88, POR:87, ITA:86, NED:85, BEL:84, CRO:83, MAR:82, EGY:78, SEN:79, TUN:75, ALG:76, KSA:72, QAT:70, IRQ:68, JOR:65, UZB:70, JPN:79, KOR:77, USA:76, MEX:80, CAN:73, URU:81, COL:80, NGA:76, CMR:74, AUS:73, IRN:72, ECU:71, WAL:74, POL:75, GHA:70, TBD:50 };
        const s1 = str[t1] || 50, s2 = str[t2] || 50;
        const tot = s1 + s2;
        const p1 = Math.round(s1 / tot * 100), p2 = 100 - p1;
        const draw = Math.max(15, 30 - Math.abs(s1 - s2));
        const a1 = Math.round((100 - draw) * p1 / 100), a2 = 100 - draw - a1;
        return { t1: a1, t2: a2, draw };
    }

    let scene, camera, renderer, globe, markers = [];
    let isDragging = false, prevX = 0, prevY = 0;
    
    function initGlobe() {
        const container = document.getElementById("globe-container");
        const w = container.clientWidth, h = container.clientHeight;
        
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        camera.position.z = 3.2;
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        // Globe sphere
        const geo = new THREE.SphereGeometry(1, 64, 64);
        const canvas = document.createElement("canvas");
        canvas.width = 2048; canvas.height = 1024;
        const ctx = canvas.getContext("2d");
        
        // Dark ocean
        const grad = ctx.createLinearGradient(0, 0, 0, 1024);
        grad.addColorStop(0, "#081220");
        grad.addColorStop(0.5, "#0c1a30");
        grad.addColorStop(1, "#081220");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 2048, 1024);
        
        // Simplified continents
        ctx.fillStyle = "#142e1a";
        ctx.strokeStyle = "#1e4a28";
        ctx.lineWidth = 1.5;
        
        // North America
        ctx.beginPath(); ctx.moveTo(140,90); ctx.lineTo(220,70); ctx.lineTo(320,80); ctx.lineTo(360,140); ctx.lineTo(340,200); ctx.lineTo(280,250); ctx.lineTo(220,270); ctx.lineTo(160,240); ctx.lineTo(120,180); ctx.lineTo(100,130); ctx.closePath(); ctx.fill(); ctx.stroke();
        // South America
        ctx.beginPath(); ctx.moveTo(260,280); ctx.lineTo(310,260); ctx.lineTo(330,300); ctx.lineTo(340,360); ctx.lineTo(310,420); ctx.lineTo(270,450); ctx.lineTo(240,420); ctx.lineTo(230,360); ctx.lineTo(240,300); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Europe
        ctx.beginPath(); ctx.moveTo(500,80); ctx.lineTo(570,70); ctx.lineTo(610,100); ctx.lineTo(600,140); ctx.lineTo(560,160); ctx.lineTo(510,150); ctx.lineTo(490,120); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Africa
        ctx.beginPath(); ctx.moveTo(500,180); ctx.lineTo(570,170); ctx.lineTo(610,210); ctx.lineTo(620,280); ctx.lineTo(590,350); ctx.lineTo(540,380); ctx.lineTo(500,360); ctx.lineTo(470,300); ctx.lineTo(480,220); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Asia
        ctx.beginPath(); ctx.moveTo(620,60); ctx.lineTo(760,50); ctx.lineTo(880,70); ctx.lineTo(940,130); ctx.lineTo(920,200); ctx.lineTo(840,240); ctx.lineTo(760,250); ctx.lineTo(680,220); ctx.lineTo(640,160); ctx.lineTo(620,100); ctx.closePath(); ctx.fill(); ctx.stroke();
        // Australia
        ctx.beginPath(); ctx.moveTo(840,330); ctx.lineTo(910,320); ctx.lineTo(940,360); ctx.lineTo(920,400); ctx.lineTo(870,410); ctx.lineTo(830,380); ctx.lineTo(820,350); ctx.closePath(); ctx.fill(); ctx.stroke();
        
        // Grid lines
        ctx.strokeStyle = "rgba(212,175,55,0.06)";
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 18; i++) {
            ctx.beginPath(); ctx.moveTo(i * 2048 / 18, 0); ctx.lineTo(i * 2048 / 18, 1024); ctx.stroke();
        }
        for (let i = 0; i < 9; i++) {
            ctx.beginPath(); ctx.moveTo(0, i * 1024 / 9); ctx.lineTo(2048, i * 1024 / 9); ctx.stroke();
        }
        
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.MeshPhongMaterial({ map: tex, transparent: true, opacity: 0.95, shininess: 15 });
        globe = new THREE.Mesh(geo, mat);
        scene.add(globe);
        
        // Atmosphere
        const atmoGeo = new THREE.SphereGeometry(1.04, 64, 64);
        const atmoMat = new THREE.MeshPhongMaterial({ color: 0x1a5f2a, transparent: true, opacity: 0.08, side: THREE.BackSide });
        scene.add(new THREE.Mesh(atmoGeo, atmoMat));
        
        // Stadium markers
        stadiums.forEach(s => {
            const phi = (90 - s.lat) * Math.PI / 180;
            const theta = (s.lng + 180) * Math.PI / 180;
            const x = -1.025 * Math.sin(phi) * Math.cos(theta);
            const y = 1.025 * Math.cos(phi);
            const z = 1.025 * Math.sin(phi) * Math.sin(theta);
            
            // Check if Egypt or Arab match at this stadium
            const stMatches = matches.filter(m => m.stadium === s.id);
            const hasEgypt = stMatches.some(m => m.egypt);
            const hasArab = stMatches.some(m => m.arab);
            
            const color = hasEgypt ? 0xce1126 : (hasArab ? 0x006233 : 0xD4AF37);
            
            const mGeo = new THREE.SphereGeometry(0.022, 16, 16);
            const mMat = new THREE.MeshBasicMaterial({ color });
            const marker = new THREE.Mesh(mGeo, mMat);
            marker.position.set(x, y, z);
            marker.userData = { stadiumId: s.id, hasEgypt, hasArab };
            
            // Glow
            const gGeo = new THREE.SphereGeometry(0.035, 16, 16);
            const gMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.25 });
            marker.add(new THREE.Mesh(gGeo, gMat));
            
            globe.add(marker);
            markers.push(marker);
        });
        
        // Lights
        scene.add(new THREE.AmbientLight(0x404040, 0.6));
        const dir = new THREE.DirectionalLight(0xffffff, 0.7);
        dir.position.set(5, 3, 5);
        scene.add(dir);
        const pt = new THREE.PointLight(0xD4AF37, 0.25, 10);
        pt.position.set(-3, 2, 3);
        scene.add(pt);
        
        // Events
        const el = renderer.domElement;
        el.addEventListener("mousedown", e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
        el.addEventListener("mousemove", e => {
            if (!isDragging) return;
            globe.rotation.y += (e.clientX - prevX) * 0.005;
            globe.rotation.x += (e.clientY - prevY) * 0.005;
            prevX = e.clientX; prevY = e.clientY;
        });
        el.addEventListener("mouseup", () => isDragging = false);
        el.addEventListener("mouseleave", () => isDragging = false);
        el.addEventListener("click", onGlobeClick);
        el.addEventListener("wheel", e => { e.preventDefault(); camera.position.z = Math.max(2, Math.min(6, camera.position.z + e.deltaY * 0.002)); });
        el.addEventListener("touchstart", e => { if (e.touches.length === 1) { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }}, {passive:false});
        el.addEventListener("touchmove", e => { if (isDragging && e.touches.length === 1) { globe.rotation.y += (e.touches[0].clientX - prevX) * 0.005; globe.rotation.x += (e.touches[0].clientY - prevY) * 0.005; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }}, {passive:false});
        el.addEventListener("touchend", () => isDragging = false);
        
        window.addEventListener("resize", () => {
            const w2 = container.clientWidth, h2 = container.clientHeight;
            camera.aspect = w2 / h2;
            camera.updateProjectionMatrix();
            renderer.setSize(w2, h2);
        });
        
        animate();
    }
    
    function onGlobeClick(e) {
        if (isDragging) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        const hits = ray.intersectObjects(markers);
        if (hits.length > 0 && hits[0].object.userData.stadiumId) {
            showStadiumModal(hits[0].object.userData.stadiumId);
        }
    }
    
    function animate() {
        requestAnimationFrame(animate);
        if (!isDragging) globe.rotation.y += 0.0008;
        const t = Date.now() * 0.002;
        markers.forEach((m, i) => {
            const s = 1 + Math.sin(t + i * 0.7) * 0.3;
            if (m.children[0]) m.children[0].scale.set(s, s, s);
        });
        renderer.render(scene, camera);
    }

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-gold">3</div><div class="text-xs text-gray-400">ماتشات المجموعة</div></div>
                        <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-gold">F</div><div class="text-xs text-gray-400">المجموعة</div></div>
                        <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-gold">3</div><div class="text-xs text-gray-400">ملاعب مختلفة</div></div>
                        <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-gold">3</div><div class="text-xs text-gray-400">دول مختلفة</div></div>
                    </div>
                    <div class="text-sm text-gray-400">
                        <p>المنافسين: 🇳🇱 هولندا • 🇮🇹 إيطاليا • 🏳️ متأهل من الملحق</p>
                        <p class="mt-1">التدريب: Gonzaga University، Spokane، واشنطن</p>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gold mb-3">📅 جدول ماتشات مصر</h3>
                <div class="space-y-3">${egyptMatches.map(m => renderMatchCard(m, true)).join("")}</div>
            `;
        } else if (tab === "arab") {
            const arabCodes = arabTeams.map(t => t.code);
            const arabMatches = matches.filter(m => m.arab || m.egypt);
            c.innerHTML = `
                <div class="glass rounded-2xl p-6 mb-6 border-r-4 border-r-green-600">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="text-5xl">🌙</div>
                        <div>
                            <h2 class="text-2xl font-bold text-gold">المنتخبات العربية</h2>
                            <p class="text-gray-400">${arabTeams.filter(t=>t.qualified).length} منتخبات عربية مؤهلة • كأس العالم 2026</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${arabTeams.map(t => `<div class="glass rounded-xl px-3 py-2 flex items-center gap-2 ${t.qualified ? "" : "opacity-50"}">
                            <span class="text-2xl">${t.flag}</span>
                            <span class="font-bold text-sm">${t.name}</span>
                            <span class="text-xs text-gray-400">المجموعة ${t.group}</span>
                            ${t.qualified ? '<span class="w-2 h-2 rounded-full bg-green-400"></span>' : '<span class="text-[10px] text-yellow-400">محتمل</span>'}
                        </div>`).join("")}
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gold mb-3">📅 جدول ماتشات المنتخبات العربية</h3>
                <div class="space-y-3">${arabMatches.map(m => renderMatchCard(m)).join("")}</div>
            `;
        } else if (tab === "schedule") {
            const stages = ["group","R32","QF","SF","3rd","Final"];
            let html = "";
            stages.forEach(s => {
                const sm = matches.filter(m => m.stage === s);
                if (!sm.length) return;
                html += `<div class="mb-6"><h3 class="text-lg font-bold text-gold mb-3"><span class="px-2 py-0.5 rounded text-xs ${stageBadge(s)}">${stageName(s)}</span></h3><div class="space-y-3">${sm.map(m => renderMatchCard(m)).join("")}</div></div>`;
            });
            c.innerHTML = html;
        } else if (tab === "groups") {
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            for (const [grp, data] of Object.entries(groups)) {
                const hasEgypt = data.egypt, hasArab = data.arab;
                html += `<div class="glass rounded-2xl p-4 ${hasEgypt ? "border border-gold/30" : hasArab ? "border border-green-500/20" : ""}">
                    <h3 class="text-lg font-bold text-gold mb-3 flex items-center gap-2">
                        المجموعة ${grp}
                        ${hasEgypt ? '<span class="text-[10px] px-2 py-0.5 rounded-full bg-red-900/40 text-red-300">🇪🇬 مصر</span>' : ""}
                        ${hasArab && !hasEgypt ? '<span class="text-[10px] px-2 py-0.5 rounded-full bg-green-900/40 text-green-300">🌙 عربي</span>' : ""}
                    </h3>
                    <div class="space-y-2">
                    ${data.teams.map(code => {
                        const t = getTeam(code);
                        const isArab = arabTeams.some(a => a.code === code);
                        return `<div class="flex items-center gap-2 p-2 rounded-lg ${isArab ? "bg-green-900/20" : "bg-white/5"}">
                            <span class="text-xl">${t.flag}</span>
                            <span class="text-sm ${isArab ? "text-green-300 font-bold" : ""}">${t.name}</span>
                        </div>`;
                    }).join("")}
                    </div>
                </div>`;
            }
            html += `</div>`;
            c.innerHTML = html;
        } else if (tab === "stadiums") {
            c.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${stadiums.map(s => {
                    const stMatches = matches.filter(m => m.stadium === s.id);
                    const hasEgypt = stMatches.some(m => m.egypt);
                    const hasArab = stMatches.some(m => m.arab);
                    return `<div class="glass rounded-2xl p-4 cursor-pointer hover:border-gold/40 transition-all" onclick="showStadiumModal('${s.id}')">
                        <div class="flex items-center justify-between mb-2">
                            <div>
                                <h3 class="font-bold text-gold">${s.name}</h3>
                                <p class="text-sm text-gray-400">${s.city}، ${s.country}</p>
                            </div>
                            <div class="flex gap-1">
                                ${hasEgypt ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-red-900/40 text-red-300">🇪🇬</span>' : ""}
                                ${hasArab && !hasEgypt ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-green-900/40 text-green-300">🌙</span>' : ""}
                            </div>
                        </div>
                        <div class="text-xs text-gray-500">السعة: ${s.cap.toLocaleString()} • ${stMatches.length} مباريات</div>
                    </div>`;
                }).join("")}
            </div>`;
        }
    }
    
    function showStadiumModal(id) {
        const s = getStadium(id);
        const stMatches = matches.filter(m => m.stadium === id);
        document.getElementById("modal-name").textContent = s.name;
        document.getElementById("modal-city").textContent = s.city + "، " + s.country;
        document.getElementById("modal-info").innerHTML = `
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${s.cap.toLocaleString()}</div><div class="text-xs text-gray-400">السعة</div></div>
                <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${stMatches.length}</div><div class="text-xs text-gray-400">مباريات</div></div>
                <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${s.country}</div><div class="text-xs text-gray-400">الدولة</div></div>
            </div>`;
        document.getElementById("modal-matches").innerHTML = stMatches.length ? stMatches.map(m => renderMatchCard(m)).join("") : '<p class="text-gray-400 text-center py-4">لا توجد مباريات محددة حالياً</p>';
        document.getElementById("stadium-modal").classList.add("active");
    }
    
    function closeModal() {
        document.getElementById("stadium-modal").classList.remove("active");
    }
    
    // Countdown
    function updateCountdown() {
        const now = new Date();
        const diff = WC_START - now;
        if (diff <= 0) {
            const fd = WC_FINAL - now;
            if (fd <= 0) { document.getElementById("cd-days").textContent = "00"; document.getElementById("cd-hours").textContent = "00"; document.getElementById("cd-mins").textContent = "00"; return; }
            const d = Math.floor(fd / 86400000), h = Math.floor((fd % 86400000) / 3600000), m = Math.floor((fd % 3600000) / 60000);
            document.getElementById("cd-days").textContent = String(d).padStart(2, "0");
            document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
            document.getElementById("cd-mins").textContent = String(m).padStart(2, "0");
            return;
        }
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000);
        document.getElementById("cd-days").textContent = String(d).padStart(2, "0");
        document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
        document.getElementById("cd-mins").textContent = String(m).padStart(2, "0");
    }
    
    // Init
    document.addEventListener("DOMContentLoaded", () => {
        initGlobe();
        switchTab("egypt");
        updateCountdown();
        setInterval(updateCountdown, 60000);
    });
    </script>
</body>
</html>
