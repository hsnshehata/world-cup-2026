    // TheSportsDB - Free, no key required
    THESPORTSDB: "https://www.thesportsdb.com/api/v1/json/3",
    LEAGUE_ID: 4429, // FIFA World Cup
    
    // Wikipedia API - Free, no key required
    WIKIPEDIA: "https://en.wikipedia.org/w/api.php",
    
    // Wikidata - Free, no key required
    WIKIDATA: "https://www.wikidata.org/w/api.php",
    
    // Cache duration (1 hour)
    CACHE_DURATION: 3600000,
    
    // World Cup dates
    WC_START: "2026-06-11T16:00:00Z",
    WC_FINAL: "2026-07-19T16:00:00Z"
};

// =====================================================

// Cache management
function getCachedData() {
    try {
        const cached = localStorage.getItem("wc2026_data");
        if (cached) {
            const data = JSON.parse(cached);
            const age = Date.now() - new Date(data.lastUpdate).getTime();
            if (age < CONFIG.CACHE_DURATION) {
                return data;
            }
        }
    } catch (e) {}
    return null;
}

function setCachedData(data) {
    try {
        localStorage.setItem("wc2026_data", JSON.stringify(data));
    } catch (e) {}
}

// API: TheSportsDB - Get match schedule
async function fetchFromTheSportsDB() {
    try {
        // Get all events for the league
        const url = `${CONFIG.THESPORTSDB}/eventsseason.php?id=${CONFIG.LEAGUE_ID}&s=2026`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        if (data.events) {
            return data.events.map(e => ({
                id: e.idEvent,
                date: e.dateEvent,
                time: e.strTime?.split(" ")[0] || "12:00",
                home: e.strHomeTeam,
                away: e.strAwayTeam,
                venue: e.strVenue,
                city: e.strCity,
                group: e.strGroup || "",
                status: e.strStatus,
                homeScore: e.intHomeScore,
                awayScore: e.intAwayScore,
                round: e.intRound
            }));
        }
    } catch (e) {
        console.log("TheSportsDB error:", e);
    }
    return null;
}

// API: Wikipedia - Get venue and team data
async function fetchFromWikipedia() {
    try {
        const url = `${CONFIG.WIKIPEDIA}?action=parse&page=2026_FIFA_World_Cup&format=json&prop=wikitext`;
        const resp = await fetch(url, {
            headers: { "User-Agent": "WorldCup2026/1.0" }
        });
        const data = await resp.json();
        
        if (data.parse && data.parse.wikitext) {
            return parseWikipediaData(data.parse.wikitext["*"]);
        }
    } catch (e) {
        console.log("Wikipedia error:", e);
    }
    return null;
}

// Parse Wikipedia wikitext for structured data
function parseWikipediaData(wikitext) {
    const result = { venues: [], groups: {} };
    
    // Extract venues
    const venuePattern = /\|\s*([^|]+)\s*\|\|\s*([^|]+)\s*\|\|\s*(\d[\d,]+)/g;
    let match;
    while ((match = venuePattern.exec(wikitext)) !== null) {
        result.venues.push({
            city: match[1].trim(),
            name: match[2].trim(),
            capacity: parseInt(match[3].replace(/,/g, ""))
        });
    }
    
    // Extract groups
    for (let g = 65; g <= 76; g++) { // A-L
        const grp = String.fromCharCode(g);
        const pattern = new RegExp(`===\\s*Group\\s+${grp}\\s*===(.*?)(?====|$)`, "s");
        const grpMatch = pattern.exec(wikitext);
        if (grpMatch) {
            const teams = [];
            const teamPattern = /\{\{fb\|([^}]+)\}\}/g;
            let teamMatch;
            while ((teamMatch = teamPattern.exec(grpMatch[1])) !== null) {
                teams.push(teamMatch[1]);
            }
            if (teams.length >= 4) {
                result.groups[grp] = teams.slice(0, 4);
            }
        }
    }
    
    return result;
}

// API: Wikidata - Get structured data
async function fetchFromWikidata() {
    try {
        // Get World Cup 2026 entity
        const url = `${CONFIG.WIKIDATA}?action=wbgetentities&ids=Q466722&format=json&languages=en&props=claims`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        if (data.entities && data.entities.Q466722) {
            const entity = data.entities.Q466722;
            return parseWikidata(entity);
        }
    } catch (e) {
        console.log("Wikidata error:", e);
    }
    return null;
}

function parseWikidata(entity) {
    const result = { venues: [], participants: [] };
    
    const claims = entity.claims || {};
    
    // P276 = location (venues)
    if (claims.P276) {
        claims.P276.forEach(c => {
            if (c.mainsnak && c.mainsnak.datavalue) {
                result.venues.push(c.mainsnak.datavalue.value);
            }
        });
    }
    
    // P710 = participant (teams)
    if (claims.P710) {
        claims.P710.forEach(c => {
            if (c.mainsnak && c.mainsnak.datavalue) {
                result.participants.push(c.mainsnak.datavalue.value);
            }
        });
    }
    
    return result;
}

// =====================================================

// =====================================================

async function initData() {
    updateApiStatus("cached", "🔄 جاري التحقق من البيانات...");
    
    // Try cache first
    const cached = getCachedData();
    if (cached) {
        appData = cached;
        updateApiStatus("cached", "📦 بيانات محفوظة (اضغط تحديث للبيانات الجديدة)");
        return;
    }
    
    // Try APIs
    await refreshData();
}

async function refreshData() {
    updateApiStatus("loading", "🔄 جاري جلب البيانات الحية...");
    
    let matches = null;
    let wikiData = null;
    
    // Try TheSportsDB
    try {
        matches = await fetchFromTheSportsDB();
        if (matches && matches.length > 0) {
            console.log("TheSportsDB:", matches.length, "matches");
        }
    } catch (e) {
        console.log("TheSportsDB failed:", e);
    }
    
    // Try Wikipedia
    try {
        wikiData = await fetchFromWikipedia();
        if (wikiData) {
            console.log("Wikipedia data:", wikiData.venues.length, "venues");
        }
    } catch (e) {
        console.log("Wikipedia failed:", e);
    }
    
    // Build data
    appData = {
        stadiums: FALLBACK_DATA.stadiums,
        teams: FALLBACK_DATA.teams,
        arabTeams: FALLBACK_DATA.arabTeams,
        matches: matches || generateFallbackMatches(),
        groups: wikiData?.groups || generateFallbackGroups(),
        lastUpdate: new Date().toISOString(),
        source: matches ? "api" : "fallback"
    };
    
    // Cache it
    setCachedData(appData);
    
    // Update UI
    const sourceText = matches ? "✅ بيانات حية من TheSportsDB" : "📦 بيانات أساسية (اضغط تحديث لاحقاً)";
    updateApiStatus(matches ? "online" : "offline", sourceText);
    
    // Re-render current tab
    const activeTab = document.querySelector(".tab-btn.active");
    if (activeTab) {
        const tabId = activeTab.id.replace("tab-", "");
        switchTab(tabId);
    }
}

function updateApiStatus(status, text) {
    const el = document.getElementById("api-status");
    el.className = `api-status api-${status}`;
    el.textContent = text;
}

// Generate fallback matches from known schedule
function generateFallbackMatches() {
    // Based on FIFA's official match calendar format
    // Group stage: June 11-27, 2026
    // Each team plays 3 matches
    const matches = [];
    let id = 1;

function getTeam(name) {
    const t = appData.teams.find(t => t.name === name || t.code === name);
    return t || { code: name, name: name, flag: "🏳️" };
}

function getStadium(id) {
    return appData.stadiums.find(s => s.id === id) || { name: id, city: "", country: "", cap: 0 };
}

function stageName(s) {
    return { group: "دور المجموعات", R32: "دور الـ 32", QF: "ربع النهائي", SF: "نصف النهائي", "3rd": "المركز الثالث", Final: "🏆 النهائي" }[s] || s;
}

function stageBadge(s) {
    return { group: "bg-blue-500/20 text-blue-300", R32: "bg-green-500/20 text-green-300", QF: "bg-yellow-500/20 text-yellow-300", SF: "bg-orange-500/20 text-orange-300", "3rd": "bg-purple-500/20 text-purple-300", Final: "bg-gold/20 text-gold" }[s] || "bg-gray-500/20 text-gray-300";
}

function fmtDate(d) {
    try {
        const dt = new Date(d);
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        return days[dt.getDay()] + "، " + dt.getDate() + " " + months[dt.getMonth()];
    } catch (e) { return d; }
}

function timeUntil(date, time) {
    try {
        const m = new Date(date + "T" + (time || "12:00") + ":00Z");
        const now = new Date();
        const diff = m - now;
        if (diff <= 0) return { text: "انتهى", past: true };
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const mn = Math.floor((diff % 3600000) / 60000);
        if (d > 0) return { text: d + " يوم و " + h + " ساعة", past: false };
        if (h > 0) return { text: h + " ساعة و " + mn + " دقيقة", past: false };
        return { text: mn + " دقيقة", past: false };
    } catch (e) { return { text: "قريباً", past: false }; }
}

function prediction(t1, t2) {
    const str = { BRA: 95, ARG: 93, FRA: 92, ENG: 90, ESP: 89, GER: 88, POR: 87, ITA: 86, NED: 85, BEL: 84, CRO: 83, MAR: 82, EGY: 78, SEN: 79, TUN: 75, ALG: 76, KSA: 72, QAT: 70, IRQ: 68, JOR: 65, UZB: 70, JPN: 79, KOR: 77, USA: 76, MEX: 80, CAN: 73, URU: 81, COL: 80, NGA: 76, CMR: 74, AUS: 73, IRN: 72, ECU: 71, WAL: 74, POL: 75, GHA: 70, TBD: 50 };
    const s1 = str[t1] || 50, s2 = str[t2] || 50;
    const tot = s1 + s2;
    const p1 = Math.round(s1 / tot * 100), p2 = 100 - p1;
    const draw = Math.max(15, 30 - Math.abs(s1 - s2));
    const a1 = Math.round((100 - draw) * p1 / 100), a2 = 100 - draw - a1;
    return { t1: a1, t2: a2, draw };
}

function renderMatchCard(m) {
    const t1 = getTeam(m.home), t2 = getTeam(m.away);
    const st = getStadium(m.venue);
    const tu = timeUntil(m.date, m.time);
    const pred = prediction(m.home, m.away);

    const isLive = m.status === "LIVE" || m.status === "FT";
    
    return `
    <div class="match-card glass rounded-2xl p-4 ${isEgypt ? "border-gold/40 bg-gold/5" : isArab ? "border-green-500/30 bg-green-900/10" : ""}">
        <div class="flex items-center justify-between mb-2">
            <span class="px-2 py-0.5 rounded text-xs ${stageBadge(m.round || "group")}">${stageName(m.round || "group")}${m.group ? " — " + m.group : ""}</span>
            <div class="flex items-center gap-2">
                ${isLive ? '<span class="live-dot"></span><span class="text-red-400 text-xs">مباشر</span>' : ""}
                <span class="text-xs text-gray-400">${fmtDate(m.date)}</span>
            </div>
        </div>
        ${m.note ? `<div class="text-xs text-gold font-bold mb-2 text-center">${m.note}</div>` : ""}
        <div class="flex items-center justify-between mb-3">
            <div class="flex-1 text-center">
                <div class="text-3xl mb-1">${t1.flag}</div>
                <div class="font-bold text-sm ${m.home === "EGY" ? "text-gold" : ""}">${t1.name}</div>
            </div>
            <div class="px-4 text-center">
                ${m.homeScore !== null && m.awayScore !== null ? 
                    `<div class="text-2xl font-bold text-gold">${m.homeScore} - ${m.awayScore}</div>` :
                    `<div class="text-xl font-bold text-gold">VS</div>`
                }
                <div class="text-xs text-gray-400">${m.time} UTC</div>
            </div>
            <div class="flex-1 text-center">
                <div class="text-3xl mb-1">${t2.flag}</div>
                <div class="font-bold text-sm ${m.away === "EGY" ? "text-gold" : ""}">${t2.name}</div>
            </div>
        </div>
        <div class="mb-2">
            <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                <span>${pred.t1}%</span><span>تعادل ${pred.draw}%</span><span>${pred.t2}%</span>
            </div>
            <div class="pred-bar flex gap-0.5">
                <div class="pred-fill bg-blue-500" style="width:${pred.t1}%"></div>
                <div class="pred-fill bg-gray-500" style="width:${pred.draw}%"></div>
                <div class="pred-fill bg-red-500" style="width:${pred.t2}%"></div>
            </div>
        </div>
        <div class="flex items-center justify-between text-xs">
            <span class="text-gray-400">🏟️ ${st.name}، ${st.city}</span>
            <span class="${tu.past ? "text-gray-500" : "text-green-400"}">⏱️ ${tu.past ? "انتهى" : tu.text}</span>
        </div>
        ${isEgypt ? '<div class="mt-2 text-center"><span class="text-xs px-3 py-1 rounded-full bg-red-900/40 text-red-300 border border-red-500/30">🇪🇬 ماتش منتخب مصر</span></div>' : ""}
        ${isArab && !isEgypt ? '<div class="mt-2 text-center"><span class="text-xs px-3 py-1 rounded-full bg-green-900/40 text-green-300 border border-green-500/30">🌙 ماتش عربي</span></div>' : ""}
    </div>`;
}

    // Update last update time
    document.getElementById("last-update").textContent = 
        `آخر تحديث: ${new Date(appData.lastUpdate).toLocaleString("ar-EG")} | المصدر: ${appData.source === "api" ? "TheSportsDB API" : "بيانات محفوظة"}`;
}

function showStadiumModal(id) {
    const s = getStadium(id);
    const stMatches = appData.matches.filter(m => m.venue === id);
    document.getElementById("modal-name").textContent = s.name;
    document.getElementById("modal-city").textContent = s.city + "، " + s.country;
    document.getElementById("modal-info").innerHTML = `
        <div class="grid grid-cols-3 gap-3 text-center">
            <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${s.cap?.toLocaleString() || "?"}</div><div class="text-xs text-gray-400">السعة</div></div>
            <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${stMatches.length}</div><div class="text-xs text-gray-400">مباريات</div></div>
            <div class="glass rounded-xl p-3"><div class="text-xl font-bold text-gold">${s.country}</div><div class="text-xs text-gray-400">الدولة</div></div>
        </div>`;
    document.getElementById("modal-matches").innerHTML = stMatches.length ? stMatches.map(m => renderMatchCard(m)).join("") : '<p class="text-gray-400 text-center py-4">لا توجد مباريات محددة حالياً</p>';
    document.getElementById("stadium-modal").classList.add("active");
}

function closeModal() {
    document.getElementById("stadium-modal").classList.remove("active");
}

// =====================================================
// THREE.JS GLOBE
// =====================================================

let scene, camera, renderer, globe, markers = [];
let isDragging = false, prevX = 0, prevY = 0;

function initGlobe() {
    const container = document.getElementById("globe-container");
    const w = container.clientWidth, h = container.clientHeight;
    
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
    camera.position.z = 3.2;
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    
    // Globe
    const geo = new THREE.SphereGeometry(1, 64, 64);
    const canvas = document.createElement("canvas");
    canvas.width = 2048; canvas.height = 1024;
    const ctx = canvas.getContext("2d");
    
    const grad = ctx.createLinearGradient(0, 0, 0, 1024);
    grad.addColorStop(0, "#081220");
    grad.addColorStop(0.5, "#0c1a30");
    grad.addColorStop(1, "#081220");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2048, 1024);
    
    ctx.fillStyle = "#142e1a";
    ctx.strokeStyle = "#1e4a28";
    ctx.lineWidth = 1.5;
    // North America
    ctx.beginPath(); ctx.moveTo(140,90); ctx.lineTo(220,70); ctx.lineTo(320,80); ctx.lineTo(360,140); ctx.lineTo(340,200); ctx.lineTo(280,250); ctx.lineTo(220,270); ctx.lineTo(160,240); ctx.lineTo(120,180); ctx.lineTo(100,130); ctx.closePath(); ctx.fill(); ctx.stroke();
    // South America
    ctx.beginPath(); ctx.moveTo(260,280); ctx.lineTo(310,260); ctx.lineTo(330,300); ctx.lineTo(340,360); ctx.lineTo(310,420); ctx.lineTo(270,450); ctx.lineTo(240,420); ctx.lineTo(230,360); ctx.lineTo(240,300); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Europe
    ctx.beginPath(); ctx.moveTo(500,80); ctx.lineTo(570,70); ctx.lineTo(610,100); ctx.lineTo(600,140); ctx.lineTo(560,160); ctx.lineTo(510,150); ctx.lineTo(490,120); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Africa
    ctx.beginPath(); ctx.moveTo(500,180); ctx.lineTo(570,170); ctx.lineTo(610,210); ctx.lineTo(620,280); ctx.lineTo(590,350); ctx.lineTo(540,380); ctx.lineTo(500,360); ctx.lineTo(470,300); ctx.lineTo(480,220); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Asia
    ctx.beginPath(); ctx.moveTo(620,60); ctx.lineTo(760,50); ctx.lineTo(880,70); ctx.lineTo(940,130); ctx.lineTo(920,200); ctx.lineTo(840,240); ctx.lineTo(760,250); ctx.lineTo(680,220); ctx.lineTo(640,160); ctx.lineTo(620,100); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Australia
    ctx.beginPath(); ctx.moveTo(840,330); ctx.lineTo(910,320); ctx.lineTo(940,360); ctx.lineTo(920,400); ctx.lineTo(870,410); ctx.lineTo(830,380); ctx.lineTo(820,350); ctx.closePath(); ctx.fill(); ctx.stroke();
    
    ctx.strokeStyle = "rgba(212,175,55,0.06)";
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 18; i++) { ctx.beginPath(); ctx.moveTo(i * 2048 / 18, 0); ctx.lineTo(i * 2048 / 18, 1024); ctx.stroke(); }
    for (let i = 0; i < 9; i++) { ctx.beginPath(); ctx.moveTo(0, i * 1024 / 9); ctx.lineTo(2048, i * 1024 / 9); ctx.stroke(); }
    
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.MeshPhongMaterial({ map: tex, transparent: true, opacity: 0.95, shininess: 15 });
    globe = new THREE.Mesh(geo, mat);
    scene.add(globe);
    
    // Atmosphere
    const atmoGeo = new THREE.SphereGeometry(1.04, 64, 64);
    const atmoMat = new THREE.MeshPhongMaterial({ color: 0x1a5f2a, transparent: true, opacity: 0.08, side: THREE.BackSide });
    scene.add(new THREE.Mesh(atmoGeo, atmoMat));
    
    // Stadium markers
    appData.stadiums.forEach(s => {
        const phi = (90 - s.lat) * Math.PI / 180;
        const theta = (s.lng + 180) * Math.PI / 180;
        const x = -1.025 * Math.sin(phi) * Math.cos(theta);
        const y = 1.025 * Math.cos(phi);
        const z = 1.025 * Math.sin(phi) * Math.sin(theta);
        
        const stMatches = appData.matches.filter(m => m.venue === s.id);
        const hasEgypt = stMatches.some(m => m.egypt);
        const hasArab = stMatches.some(m => m.arab);
        const color = hasEgypt ? 0xce1126 : (hasArab ? 0x006233 : 0xD4AF37);
        
        const mGeo = new THREE.SphereGeometry(0.022, 16, 16);
        const mMat = new THREE.MeshBasicMaterial({ color });
        const marker = new THREE.Mesh(mGeo, mMat);
        marker.position.set(x, y, z);
        marker.userData = { stadiumId: s.id };
        
        const gGeo = new THREE.SphereGeometry(0.035, 16, 16);
        const gMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.25 });
        marker.add(new THREE.Mesh(gGeo, gMat));
        
        globe.add(marker);
        markers.push(marker);
    });
    
    scene.add(new THREE.AmbientLight(0x404040, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(5, 3, 5);
    scene.add(dir);
    const pt = new THREE.PointLight(0xD4AF37, 0.25, 10);
    pt.position.set(-3, 2, 3);
    scene.add(pt);
    
    // Events
    const el = renderer.domElement;
    el.addEventListener("mousedown", e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
    el.addEventListener("mousemove", e => { if (!isDragging) return; globe.rotation.y += (e.clientX - prevX) * 0.005; globe.rotation.x += (e.clientY - prevY) * 0.005; prevX = e.clientX; prevY = e.clientY; });
    el.addEventListener("mouseup", () => isDragging = false);
    el.addEventListener("mouseleave", () => isDragging = false);
    el.addEventListener("click", onGlobeClick);
    el.addEventListener("wheel", e => { e.preventDefault(); camera.position.z = Math.max(2, Math.min(6, camera.position.z + e.deltaY * 0.002)); });
    el.addEventListener("touchstart", e => { if (e.touches.length === 1) { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; } }, { passive: false });
    el.addEventListener("touchmove", e => { if (isDragging && e.touches.length === 1) { globe.rotation.y += (e.touches[0].clientX - prevX) * 0.005; globe.rotation.x += (e.touches[0].clientY - prevY) * 0.005; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; } }, { passive: false });
    el.addEventListener("touchend", () => isDragging = false);
    
    window.addEventListener("resize", () => {
        const w2 = container.clientWidth, h2 = container.clientHeight;
        camera.aspect = w2 / h2;
        camera.updateProjectionMatrix();
        renderer.setSize(w2, h2);
    });
    
    animate();
}

function onGlobeClick(e) {
    if (isDragging) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(markers);
    if (hits.length > 0 && hits[0].object.userData.stadiumId) {
        showStadiumModal(hits[0].object.userData.stadiumId);
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (!isDragging) globe.rotation.y += 0.0008;
    const t = Date.now() * 0.002;
    markers.forEach((m, i) => { const s = 1 + Math.sin(t + i * 0.7) * 0.3; if (m.children[0]) m.children[0].scale.set(s, s, s); });
    renderer.render(scene, camera);
}

// Countdown
function updateCountdown() {
    const now = new Date();
    const diff = new Date(CONFIG.WC_START) - now;
    if (diff <= 0) {
        const fd = new Date(CONFIG.WC_FINAL) - now;
        if (fd <= 0) { document.getElementById("cd-days").textContent = "00"; document.getElementById("cd-hours").textContent = "00"; document.getElementById("cd-mins").textContent = "00"; return; }
        const d = Math.floor(fd / 86400000), h = Math.floor((fd % 86400000) / 3600000), m = Math.floor((fd % 3600000) / 60000);
        document.getElementById("cd-days").textContent = String(d).padStart(2, "0");
        document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
        document.getElementById("cd-mins").textContent = String(m).padStart(2, "0");
        return;
    }
    const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000);
    document.getElementById("cd-days").textContent = String(d).padStart(2, "0");
    document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
    document.getElementById("cd-mins").textContent = String(m).padStart(2, "0");
}

// =====================================================
// INITIALIZATION
// =====================================================

document.addEventListener("DOMContentLoaded", () => {
    initGlobe();
    initData().then(() => {
        switchTab("egypt");
    });
    updateCountdown();
    setInterval(updateCountdown, 60000);
});
</script>
