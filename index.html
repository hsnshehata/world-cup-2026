<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كأس العالم 2026 🏆 | FIFA World Cup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: #050510; color: #fff; }
        .glass { background: rgba(10,10,30,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212,175,55,0.15); }
        .gold { color: #D4AF37; }
        .match-card { border: 1px solid rgba(212,175,55,0.1); transition: all .2s; }
        .match-card:hover { border-color: rgba(212,175,55,.4); transform: translateY(-2px); }
        .tab { transition: all .2s; }
        .tab.active { background: linear-gradient(135deg,#D4AF37,#F4D03F); color: #000; font-weight: 700; }
        #globe { width: 100%; height: 380px; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 8px rgba(212,175,55,.4)} 50%{box-shadow:0 0 20px rgba(212,175,55,.7)} }
        .countdown-digit { background: linear-gradient(135deg,#D4AF37,#F4D03F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="glass sticky top-0 z-50 px-4 py-3">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🏆</span>
            <div>
                <h1 class="text-xl font-bold gold">كأس العالم 2026</h1>
                <p class="text-xs text-gray-400">USA • Canada • Mexico</p>
            </div>
        </div>
        <div class="flex items-center gap-2 text-center">
            <div class="glass px-2 py-1 rounded-lg"><div class="countdown-digit text-lg" id="cd-days">--</div><div class="text-[9px] text-gray-400">يوم</div></div>
            <div class="countdown-digit">:</div>
            <div class="glass px-2 py-1 rounded-lg"><div class="countdown-digit text-lg" id="cd-hours">--</div><div class="text-[9px] text-gray-400">ساعة</div></div>
            <div class="countdown-digit">:</div>
            <div class="glass px-2 py-1 rounded-lg"><div class="countdown-digit text-lg" id="cd-mins">--</div><div class="text-[9px] text-gray-400">دقيقة</div></div>
        </div>
    </div>
    <div class="h-0.5 bg-gradient-to-r from-red-600 via-white to-black mt-2"></div>
</header>

<!-- Globe -->
<section class="glass">
    <div id="globe"></div>
</section>

<!-- Main -->
<main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
        <button onclick="showTab('egypt')" id="t-egypt" class="tab active px-4 py-2 rounded-xl text-sm">🇪🇬 مصر</button>
        <button onclick="showTab('arab')" id="t-arab" class="tab glass px-4 py-2 rounded-xl text-sm">🌙 عربي</button>
        <button onclick="showTab('groups')" id="t-groups" class="tab glass px-4 py-2 rounded-xl text-sm">📊 المجموعات</button>
        <button onclick="showTab('stadiums')" id="t-stadiums" class="tab glass px-4 py-2 rounded-xl text-sm">🏟️ الملاعب</button>
    </div>
    <div id="content"></div>
</main>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center p-4" onclick="if(event.target===this) document.getElementById('modal').classList.add('hidden')">
    <div class="glass rounded-2xl p-6 max-w-lg w-full max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h2 id="m-title" class="text-xl font-bold gold"></h2>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 text-2xl">&times;</button>
        </div>
        <div id="m-body"></div>
    </div>
</div>

function T(code) { return teams[code] || {f:"🏳️",n:code}; }
function S(id) { return stadiums.find(s=>s.id===id) || {name:id,city:"",cap:0}; }
function fmtDate(d) { const dt=new Date(d); return dt.toLocaleDateString("ar-EG",{weekday:"long",day:"numeric",month:"long"}); }
function timeLeft(d,t) {
    const m=new Date(d+"T"+t+":00Z"), now=new Date(), diff=m-now;
    if(diff<=0) return "انتهى";
    const dd=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5);
    return dd>0? dd+" يوم "+h+" ساعة" : h+" ساعة";
}
function pred(h,a) {
    const s={BRA:95,ARG:93,FRA:92,ENG:90,ESP:89,GER:88,POR:87,ITA:86,NED:85,BEL:84,CRO:83,MAR:82,EGY:78,SEN:79,TUN:75,ALG:76,QAT:70,IRQ:68,JOR:65,NOR:72,JPN:79,KOR:77,USA:76,MEX:80,CAN:73,URU:81,COL:80,NGA:76,CMR:74,AUS:73,IRN:72,ECU:71,WAL:74,POL:75,GHA:70,SUI:78,UKR:72,DEN:76,SWE:73,SRB:70,TUR:73,CIV:74,MLI:68,CPV:65,UAE:63,PAN:60,NZL:58,SCO:70,TBD:50};
    const sh=s[h]||50,sa=s[a]||50,t=sh+sa,p=Math.round(sh/t*100),pa=100-p,dr=Math.max(15,30-Math.abs(sh-sa));
    return {h:Math.round((100-dr)*p/100),a:100-dr-Math.round((100-dr)*p/100),d:dr};
}
function stageName(r) { return {1:"الجولة الأولى",2:"الجولة الثانية",3:"الجولة الثالثة",R16:"دور الـ 16",QF:"ربع النهائي",SF:"نصف النهائي",3rd:"المركز الثالث",FINAL:"🏆 النهائي"}[r]||r; }

function matchCard(m) {

            <span>${fmtDate(m.d)}</span>
        </div>
        ${m.note?`<div class="text-xs text-amber-400 font-bold text-center mb-1">${m.note}</div>`:""}
        <div class="flex items-center justify-between mb-2">
            <div class="text-center flex-1"><div class="text-2xl">${h.f}</div><div class="text-sm font-bold ${m.h==="EGY"?"text-amber-400":""}">${h.n}</div></div>
            <div class="px-3 text-center"><div class="text-lg font-bold gold">VS</div><div class="text-[10px] text-gray-500">${m.t}</div></div>
            <div class="text-center flex-1"><div class="text-2xl">${a.f}</div><div class="text-sm font-bold ${m.a==="EGY"?"text-amber-400":""}">${a.n}</div></div>
        </div>
        <div class="mb-2"><div class="flex justify-between text-[10px] text-gray-500 mb-1"><span>${p.h}%</span><span>تعادل ${p.d}%</span><span>${p.a}%</span></div>
        <div class="h-1.5 rounded bg-white/10 flex gap-0.5"><div class="h-full rounded bg-blue-500" style="width:${p.h}%"></div><div class="h-full rounded bg-gray-500" style="width:${p.d}%"></div><div class="h-full rounded bg-red-500" style="width:${p.a}%"></div></div></div>
        <div class="flex justify-between text-xs"><span class="text-gray-400">🏟️ ${s.name}، ${s.city}</span><span class="text-green-400">⏱️ ${tl}</span></div>
        ${m.egypt?'<div class="mt-1 text-center"><span class="text-[10px] px-2 py-0.5 rounded-full bg-red-900/40 text-red-300">🇪🇬 ماتش مصر</span></div>':""}

    </div>`;
}

        </div>
        <h3 class="text-lg font-bold gold mb-3">📅 جدول ماتشات مصر</h3>
        <div class="space-y-3">${em.map(m=>matchCard(m)).join("")}</div>`;
    }
    else if(t==="arab") {
        const am=matches.filter(m=>m.arab||m.egypt);
        c.innerHTML=`<div class="glass rounded-xl p-5 mb-5 border-r-4 border-r-green-600">
            <div class="flex items-center gap-4 mb-4"><span class="text-4xl">🌙</span><div><h2 class="text-2xl font-bold gold">المنتخبات العربية</h2><p class="text-gray-400">9 منتخبات عربية — رقم قياسي!</p></div></div>
            <div class="flex flex-wrap gap-2">
                ${arabTeams.map(code=>{const T_=T(code);return `<div class="glass rounded-lg px-3 py-2 flex items-center gap-2"><span class="text-xl">${T_.f}</span><span class="font-bold text-sm">${T_.n}</span><span class="text-xs text-gray-400">المجموعة ${groups[Object.keys(groups).find(g=>groups[g].teams.includes(code))]?.name.replace("Group ","")||"?"}</span></div>`;}).join("")}
            </div>
            <div class="mt-3 p-3 rounded-lg bg-amber-900/20 border border-amber-500/20">
                <p class="text-sm text-amber-300 font-bold">🔥 المجموعة J: أول مجموعة عربية خالصة!</p>
                <p class="text-xs text-gray-400">مصر • تونس • الجزائر • العراق — 4 منتخبات عربية في مجموعة واحدة</p>
            </div>
        </div>
        <h3 class="text-lg font-bold gold mb-3">📅 جدول الماتشات العربية</h3>
        <div class="space-y-3">${am.map(m=>matchCard(m)).join("")}</div>`;
    }
    else if(t==="groups") {
        let html='<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">';
        for(const[g,data] of Object.entries(groups)) {
            const hasArab=data.teams.some(t=>arabTeams.includes(t));
            const hasEgypt=data.teams.includes("EGY");
            html+=`<div class="glass rounded-xl p-4 ${hasEgypt?"border border-amber-500/30":hasArab?"border border-green-500/20":""}">
                <h3 class="font-bold gold mb-2 flex items-center gap-2">المجموعة ${g}
                    ${hasEgypt?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-900/40 text-red-300">🇪🇬</span>':""}
                    ${hasArab&&!hasEgypt?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-900/40 text-green-300">🌙</span>':""}
                </h3>
                <div class="space-y-1">
                ${data.teams.map(code=>{const T_=T(code);const isA=arabTeams.includes(code);return `<div class="flex items-center gap-2 p-1.5 rounded ${isA?"bg-green-900/20":"bg-white/5"}"><span class="text-lg">${T_.f}</span><span class="text-sm ${isA?"text-green-300 font-bold":""}">${T_.n}</span></div>`;}).join("")}
                </div></div>`;
        }
        html+=`</div>`;
        c.innerHTML=html;
    }
    else if(t==="stadiums") {
        c.innerHTML=`<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${stadiums.map(s=>{const sm=matches.filter(m=>m.m===s.id);const hasE=sm.some(m=>m.egypt);const hasA=sm.some(m=>m.arab);return `<div class="glass rounded-xl p-4 cursor-pointer hover:border-amber-500/40" onclick="showStadium('${s.id}')">
                <div class="flex justify-between"><div><h3 class="font-bold gold">${s.name}</h3><p class="text-sm text-gray-400">${s.city}، ${s.country}</p></div>
                <div class="flex gap-1">${hasE?'<span class="text-[10px] px-1 py-0.5 rounded bg-red-900/40 text-red-300">🇪🇬</span>':""}${hasA&&!hasE?'<span class="text-[10px] px-1 py-0.5 rounded bg-green-900/40 text-green-300">🌙</span>':""}</div></div>
                <div class="text-xs text-gray-500 mt-1">السعة: ${s.cap?.toLocaleString()} • ${sm.length} مباريات</div>
            </div>`;}).join("")}
        </div>`;
    }
}

function showStadium(id) {
    const s=S(id), sm=matches.filter(m=>m.s===id);
    document.getElementById("m-title").textContent=s.name;
    document.getElementById("m-body").innerHTML=`<div class="grid grid-cols-3 gap-2 text-center mb-4">
        <div class="glass rounded-lg p-2"><div class="text-lg font-bold gold">${s.cap?.toLocaleString()}</div><div class="text-[10px] text-gray-400">السعة</div></div>
        <div class="glass rounded-lg p-2"><div class="text-lg font-bold gold">${sm.length}</div><div class="text-[10px] text-gray-400">مباريات</div></div>
        <div class="glass rounded-lg p-2"><div class="text-lg font-bold gold">${s.country}</div><div class="text-[10px] text-gray-400">الدولة</div></div>
    </div>
    <div class="space-y-2">${sm.length?sm.map(m=>matchCard(m)).join(""):'<p class="text-gray-400 text-center">لا توجد مباريات محددة</p>'}</div>`;
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("modal").classList.add("flex");
}

// =====================================================
// GLOBE
// =====================================================
let scene,camera,renderer,globeMesh,markers=[],drag=false,px,py;

function initGlobe() {
    const el=document.getElementById("globe"),w=el.clientWidth,h=el.clientHeight;
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(45,w/h,.1,1000);
    camera.position.z=3;
    renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(w,h);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    el.appendChild(renderer.domElement);
    
    // Sphere
    const geo=new THREE.SphereGeometry(1,64,64);
    const cv=document.createElement("canvas");cv.width=2048;cv.height=1024;
    const cx=cv.getContext("2d");
    const gr=cx.createLinearGradient(0,0,0,1024);gr.addColorStop(0,"#081220");gr.addColorStop(.5,"#0c1a30");gr.addColorStop(1,"#081220");
    cx.fillStyle=gr;cx.fillRect(0,0,2048,1024);
    cx.fillStyle="#142e1a";cx.strokeStyle="#1e4a28";cx.lineWidth=1.5;
    // Continents (simplified)
    cx.beginPath();cx.moveTo(140,90);cx.lineTo(220,70);cx.lineTo(320,80);cx.lineTo(360,140);cx.lineTo(340,200);cx.lineTo(280,250);cx.lineTo(220,270);cx.lineTo(160,240);cx.lineTo(120,180);cx.lineTo(100,130);cx.closePath();cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(260,280);cx.lineTo(310,260);cx.lineTo(330,300);cx.lineTo(340,360);cx.lineTo(310,420);cx.lineTo(270,450);cx.lineTo(240,420);cx.lineTo(230,360);cx.lineTo(240,300);cx.closePath();cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(500,80);cx.lineTo(570,70);cx.lineTo(610,100);cx.lineTo(600,140);cx.lineTo(560,160);cx.lineTo(510,150);cx.lineTo(490,120);cx.closePath();cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(500,180);cx.lineTo(570,170);cx.lineTo(610,210);cx.lineTo(620,280);cx.lineTo(590,350);cx.lineTo(540,380);cx.lineTo(500,360);cx.lineTo(470,300);cx.lineTo(480,220);cx.closePath();cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(620,60);cx.lineTo(760,50);cx.lineTo(880,70);cx.lineTo(940,130);cx.lineTo(920,200);cx.lineTo(840,240);cx.lineTo(760,250);cx.lineTo(680,220);cx.lineTo(640,160);cx.lineTo(620,100);cx.closePath();cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(840,330);cx.lineTo(910,320);cx.lineTo(940,360);cx.lineTo(920,400);cx.lineTo(870,410);cx.lineTo(830,380);cx.lineTo(820,350);cx.closePath();cx.fill();cx.stroke();
    // Grid
    cx.strokeStyle="rgba(212,175,55,0.05)";cx.lineWidth=.5;
    for(let i=0;i<18;i++){cx.beginPath();cx.moveTo(i*2048/18,0);cx.lineTo(i*2048/18,1024);cx.stroke();}
    for(let i=0;i<9;i++){cx.beginPath();cx.moveTo(0,i*1024/9);cx.lineTo(2048,i*1024/9);cx.stroke();}
    
    const tex=new THREE.CanvasTexture(cv);
    globeMesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({map:tex,transparent:true,opacity:.95,shininess:10}));
    scene.add(globeMesh);
    
    // Atmosphere
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.04,64,64),new THREE.MeshPhongMaterial({color:0x1a5f2a,transparent:true,opacity:.06,side:THREE.BackSide})));
    
    // Markers
    stadiums.forEach(s=>{
        const sm=matches.filter(m=>m.s===s.id);
        const hasE=sm.some(m=>m.egypt),hasA=sm.some(m=>m.arab);
        const col=hasE?0xce1126:hasA?0x006233:0xD4AF37;
        const phi=(90-s.lat)*Math.PI/180,theta=(s.lng+180)*Math.PI/180;
        const x=-1.03*Math.sin(phi)*Math.cos(theta),y=1.03*Math.cos(phi),z=1.03*Math.sin(phi)*Math.sin(theta);
        const m=new THREE.Mesh(new THREE.SphereGeometry(.02,12,12),new THREE.MeshBasicMaterial({color:col}));
        m.position.set(x,y,z);m.userData={id:s.id};
        m.add(new THREE.Mesh(new THREE.SphereGeometry(.035,12,12),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.2})));
        globeMesh.add(m);markers.push(m);
    });
    
    scene.add(new THREE.AmbientLight(0x404040,.5));
    const dl=new THREE.DirectionalLight(0xffffff,.6);dl.position.set(5,3,5);scene.add(dl);
    
    // Events
    const E=renderer.domElement;
    E.addEventListener("mousedown",e=>{drag=true;px=e.clientX;py=e.clientY;});
    E.addEventListener("mousemove",e=>{if(!drag)return;globeMesh.rotation.y+=(e.clientX-px)*.005;globeMesh.rotation.x+=(e.clientY-py)*.005;px=e.clientX;py=e.clientY;});
    E.addEventListener("mouseup",()=>drag=false);
    E.addEventListener("mouseleave",()=>drag=false);
    E.addEventListener("click",e=>{
        if(drag)return;
        const r=E.getBoundingClientRect(),m=new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1);
        const ray=new THREE.Raycaster();ray.setFromCamera(m,camera);
        const h=ray.intersectObjects(markers);
        if(h.length>0&&h[0].object.userData.id)showStadium(h[0].object.userData.id);
    });
    E.addEventListener("wheel",e=>{e.preventDefault();camera.position.z=Math.max(2,Math.min(6,camera.position.z+e.deltaY*.002));});
    E.addEventListener("touchstart",e=>{if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}},{passive:false});
    E.addEventListener("touchmove",e=>{if(drag&&e.touches.length===1){globeMesh.rotation.y+=(e.touches[0].clientX-px)*.005;globeMesh.rotation.x+=(e.touches[0].clientY-py)*.005;px=e.touches[0].clientX;py=e.touches[0].clientY;}},{passive:false});
    E.addEventListener("touchend",()=>drag=false);
    
    window.addEventListener("resize",()=>{const w2=el.clientWidth,h2=el.clientHeight;camera.aspect=w2/h2;camera.updateProjectionMatrix();renderer.setSize(w2,h2);});
    
    (function anim(){requestAnimationFrame(anim);
        if(!drag)globeMesh.rotation.y+=.0008;
        const t=Date.now()*.002;
        markers.forEach((m,i)=>{const s=1+Math.sin(t+i*.7)*.3;if(m.children[0])m.children[0].scale.set(s,s,s);});
        renderer.render(scene,camera);
    })();
}

// Countdown
function updateCD() {
    const now=new Date(),diff=new Date("2026-06-11T16:00:00Z")-now;
    if(diff<=0){document.getElementById("cd-days").textContent="00";document.getElementById("cd-hours").textContent="00";document.getElementById("cd-mins").textContent="00";return;}
    const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4);
    document.getElementById("cd-days").textContent=String(d).padStart(2,"0");
    document.getElementById("cd-hours").textContent=String(h).padStart(2,"0");
    document.getElementById("cd-mins").textContent=String(m).padStart(2,"0");
}

// Init
document.addEventListener("DOMContentLoaded",()=>{
    initGlobe();
    showTab("egypt");
    updateCD();
    setInterval(updateCD,60000);
});
</script>
